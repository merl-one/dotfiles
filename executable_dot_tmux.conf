# --- TMUX: Default Configuration with Gruvbox Dark Theme ---
# Using vanilla tmux defaults for portability
# (No custom keybinds - works everywhere)

# Default prefix: Ctrl+b (unchanged from tmux default)

# Basics
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1

# Gruvbox Dark Theme
set -g status-style "bg=#282828 fg=#ebdbb2"
set -g status-left-style "bg=#458588 fg=#282828 bold"
set -g status-left " #S "
set -g status-right-style "bg=#1d2021 fg=#ebdbb2"
set -g status-right " %H:%M "
set -g window-status-current-style "bg=#689d6a fg=#282828 bold"
set -g window-status-style "bg=#1d2021 fg=#ebdbb2"
set -g message-command-style "bg=#282828 fg=#d3869b"
set -g message-style "bg=#282828 fg=#fabd2f"

# Pane borders
set -g pane-border-style "bg=#282828 fg=#1d2021"
set -g pane-active-border-style "bg=#282828 fg=#689d6a"

# Plugins (minimal)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
