# Starship config — homelab/DevOps workflow
# Gruvbox Dark theme

format = """
[](fg:#458588)\
$os\
$username\
[](bg:#689d6a fg:#458588)\
$directory\
[](fg:#689d6a bg:#1d2021)\
$git_branch\
$git_status\
[](fg:#1d2021 bg:#282828)\
$kubernetes\
$python\
$nodejs\
$terraform\
[](fg:#282828)\
$line_break\
$character"""

[os]
disabled = false
style = "bg:#458588 fg:#282828 bold"

[os.symbols]
Windows = "󰍲"
Ubuntu = ""
Linux = ""

[username]
show_always = true
style_user = "bg:#458588 fg:#282828 bold"
style_root = "bg:#fb4934 fg:#282828 bold"
format = '[$user ]($style)'
disabled = false

[directory]
style = "fg:#282828 bg:#689d6a bold"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "fg:#ebdbb2 bg:#1d2021"
format = '[ $symbol$branch ]($style)'

[git_status]
style = "fg:#fb4934 bg:#1d2021"
format = '[$all_status$ahead_behind ]($style)'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"

[kubernetes]
disabled = false
style = "fg:#689d6a bg:#282828"
format = '[ ⎈ $context\($namespace\) ]($style)'

[python]
symbol = " "
style = "fg:#b8bb26 bg:#282828"
format = '[ $symbol($version)(\($virtualenv\)) ]($style)'

[nodejs]
symbol = " "
style = "fg:#b8bb26 bg:#282828"
format = '[ $symbol($version) ]($style)'

[terraform]
format = "[ 󱁢 $workspace ]($style)"
style = "fg:#d3869b bg:#282828"

[character]
success_symbol = "[❯](bold #b8bb26)"
error_symbol = "[❯](bold #fb4934)"
vimcmd_symbol = "[❮](bold #d3869b)"

[time]
disabled = true

[cmd_duration]
min_time = 2000
format = "[ $duration](fg:#fabd2f bg:#282828)"
